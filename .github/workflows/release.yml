name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    uses: konradmichalik/reusable-github-actions/.github/workflows/release.yml@main

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build client
        run: npm run build

      - name: Publish md-annotator to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install opencode plugin dependencies
        run: npm install
        working-directory: apps/opencode

      - name: Build opencode plugin
        run: npm run build
        working-directory: apps/opencode

      - name: Publish md-annotator-opencode to npm
        run: npm publish --access public
        working-directory: apps/opencode
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
